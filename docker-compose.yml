services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fraud_admin
      POSTGRES_PASSWORD: fraud_local_dev
      POSTGRES_DB: fraud_detection
    ports:
      - "5433:5432"
    volumes:
      - fraud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_admin -d fraud_detection"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fraud_postgres_data:
